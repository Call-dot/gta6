<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Signing Agreement</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#111}
    h1{font-size:1.6rem;margin-bottom:0.2rem}
    p.notice{background:#fff8e1;border-left:4px solid #ffd54f;padding:12px;border-radius:6px}
    .canvas-wrap{border:1px solid #ddd;padding:12px;border-radius:8px;margin-top:16px;background:#fafafa}
    canvas{display:block;background:#fff;border:1px dashed #ccc;width:100%;height:200px;touch-action:none}
    .controls{margin-top:8px;display:flex;gap:8px}
    button{padding:8px 12px;border-radius:6px;border:1px solid #bbb;background:#f6f6f6;cursor:pointer}
    button.primary{background:#0366d6;color:white;border-color:#0356b0}
    .signed{margin-top:16px}
    .small{font-size:0.9rem;color:#555}
  </style>
</head>
<body>
  <h1>Signing Agreement</h1>
  <p class="notice">Callum is no responsible for any harm for going on the bed. If you agree, please sign here.</p>

  <div id="canvasWrap" class="canvas-wrap">
    <label class="small">Signature area (draw with mouse, touch, or stylus):</label>
    <canvas id="sig" width="800" height="200"></canvas>
    <div class="controls">
      <button id="clear">Clear</button>
      <button id="undo">Undo</button>
      <button id="confirm" class="primary">Confirm</button>
    </div>
    <p class="small">When you click "Confirm" your signature will be accepted locally. No data is sent to a server and nothing will be downloaded.</p>
    <div id="signed" class="signed"></div>
  </div>

  <script>
    // Simple signature pad implementation with undo
    const canvas = document.getElementById('sig');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvasWrap');
    let drawing = false;
    let currentPath = [];
    const paths = [];

    function getPointerPos(e){
      const rect = canvas.getBoundingClientRect();
      if (e.touches && e.touches[0]) e = e.touches[0];
      return {x: (e.clientX - rect.left) * (canvas.width / rect.width), y: (e.clientY - rect.top) * (canvas.height / rect.height)};
    }

    function start(e){
      e.preventDefault();
      drawing = true;
      currentPath = [];
      const p = getPointerPos(e);
      currentPath.push(p);
      draw();
    }
    function move(e){
      if(!drawing) return;
      e.preventDefault();
      const p = getPointerPos(e);
      currentPath.push(p);
      draw();
    }
    function end(e){
      if(!drawing) return;
      drawing = false;
      // only push if there are points
      if (currentPath.length) paths.push(currentPath.slice());
      currentPath = [];
      draw();
    }

    function draw(){
      // Clear and paint white background so PNG previews have white bg
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#111';
      for(let path of paths) drawPath(path);
      drawPath(currentPath);
    }
    function drawPath(path){
      if(!path || path.length==0) return;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for(let i=1;i<path.length;i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('touchstart', start, {passive:false});
    window.addEventListener('mousemove', move);
    canvas.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchend', end);

    document.getElementById('clear').addEventListener('click', ()=>{ paths.length=0; currentPath=[]; draw(); document.getElementById('signed').innerHTML=''; });
    document.getElementById('undo').addEventListener('click', ()=>{
      // If a stroke is in progress, cancel the current stroke
      if (currentPath && currentPath.length) {
        currentPath = [];
        drawing = false;
        draw();
        return;
      }
      // Otherwise remove last completed stroke
      if (paths.length>0) {
        paths.pop();
        draw();
      }
    });

    document.getElementById('confirm').addEventListener('click', ()=>{
      if(paths.length===0){ if(!confirm('No signature detected. Do you still want to confirm?')) return; }
      // Replace the whole signing area with a simple thank-you message (no download, nothing uploaded)
      canvasWrap.innerHTML = '<div style="padding:18px;text-align:center;"><strong>Thank you.</strong></div>';
    });

    // initialize blank canvas background
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  </script>
</body>
</html>

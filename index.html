<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Signing Agreement</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#111}
    h1{font-size:1.6rem;margin-bottom:0.2rem}
    p.notice{background:#fff8e1;border-left:4px solid #ffd54f;padding:12px;border-radius:6px}
    .canvas-wrap{border:1px solid #ddd;padding:12px;border-radius:8px;margin-top:16px;background:#fafafa}
    canvas{display:block;background:#fff;border:1px dashed #ccc;width:100%;height:200px;touch-action:none}
    .controls{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
    button{padding:8px 12px;border-radius:6px;border:1px solid #bbb;background:#f6f6f6;cursor:pointer}
    button.primary{background:#0366d6;color:white;border-color:#0356b0}
    .signed{margin-top:16px}
    .small{font-size:0.9rem;color:#555}
    .center{display:flex;justify-content:center;align-items:center}
    /* Fullscreen tweaks so the canvas fills the view when fullscreened */
    :fullscreen .canvas-wrap, :-webkit-full-screen .canvas-wrap { width:100vw; height:100vh; margin:0; border-radius:0; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:18px; box-sizing:border-box; }
    :fullscreen canvas, :-webkit-full-screen canvas { width:100%; height:60vh; max-height:80vh; }
    .start-wrap{margin-top:12px;text-align:center}
  </style>
</head>
<body>
  <h1>Signing Agreement</h1>
  <p class="notice">Callum is no responsible for any harm for going on the bed. If you agree, please sign here.</p>

  <div id="canvasWrap" class="canvas-wrap">
    <label class="small">Signature area (draw with mouse, touch, or stylus):</label>
    <canvas id="sig" width="1200" height="400"></canvas>

    <div class="start-wrap">
      <button id="startFull" class="primary">Start Fullscreen Signing</button>
    </div>

    <div id="controlsRow" class="controls" style="margin-top:12px;display:none;">
      <button id="clear">Clear</button>
      <button id="undo">Undo</button>
      <button id="confirm" class="primary">Confirm</button>
    </div>

    <p class="small">Signing happens locally in your browser. After Confirm the UI is replaced with a thank-you message and signing is disabled.</p>
    <div id="signed" class="signed"></div>
  </div>

  <script>
    // Fullscreen one-time signing pad
    const canvas = document.getElementById('sig');
    const ctx = canvas.getContext('2d');
    const canvasWrap = document.getElementById('canvasWrap');
    const startFull = document.getElementById('startFull');
    const controlsRow = document.getElementById('controlsRow');
    let drawing = false;
    let currentPath = [];
    const paths = [];
    let signed = false;
    let signingEnabled = false; // enabled only after entering fullscreen via Start

    function getPointerPos(e){
      const rect = canvas.getBoundingClientRect();
      if (e.touches && e.touches[0]) e = e.touches[0];
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function start(e){
      if (!signingEnabled) return;
      e.preventDefault();
      drawing = true;
      currentPath = [];
      const p = getPointerPos(e);
      currentPath.push(p);
      draw();
    }
    function move(e){
      if(!drawing || !signingEnabled) return;
      e.preventDefault();
      const p = getPointerPos(e);
      currentPath.push(p);
      draw();
    }
    function end(e){
      if(!drawing || !signingEnabled) return;
      drawing = false;
      if (currentPath.length) paths.push(currentPath.slice());
      currentPath = [];
      draw();
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#111';
      for(let path of paths) drawPath(path);
      drawPath(currentPath);
    }
    function drawPath(path){
      if(!path || path.length==0) return;
      ctx.beginPath();
      ctx.moveTo(path[0].x, path[0].y);
      for(let i=1;i<path.length;i++) ctx.lineTo(path[i].x, path[i].y);
      ctx.stroke();
    }

    // Event listeners (touch passive:false so preventDefault works)
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('touchstart', start, {passive:false});
    window.addEventListener('mousemove', move);
    canvas.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchend', end);

    // Start fullscreen signing
    startFull.addEventListener('click', async () => {
      if (signed) return;
      // Request fullscreen on the canvasWrap so CSS fullscreen rules apply
      const el = canvasWrap;
      try {
        if (el.requestFullscreen) {
          await el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
          el.webkitRequestFullscreen();
        } else if (el.msRequestFullscreen) {
          el.msRequestFullscreen();
        } else {
          // Fallback: still enable signing inline
          signingEnabled = true;
          controlsRow.style.display = 'flex';
          startFull.style.display = 'none';
          return;
        }
        // When fullscreen is entered, enable signing and show controls
        signingEnabled = true;
        controlsRow.style.display = 'flex';
        startFull.style.display = 'none';
        // Resize canvas backing to match fullscreen size for better fidelity
        resizeCanvasForDisplay();
      } catch (err) {
        // If permission denied or error, enable inline signing as fallback
        signingEnabled = true;
        controlsRow.style.display = 'flex';
        startFull.style.display = 'none';
      }
    });

    // Adjust canvas resolution to display size (improves drawing sharpness)
    function resizeCanvasForDisplay() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(600, Math.floor(rect.width * ratio));
      canvas.height = Math.max(200, Math.floor(rect.height * 0.6 * ratio));
      ctx.scale(ratio, ratio);
      draw();
    }
    window.addEventListener('resize', () => {
      if (document.fullscreenElement === canvasWrap) resizeCanvasForDisplay();
    });

    // Undo/Clear/Confirm handlers
    document.getElementById('clear').addEventListener('click', ()=>{
      if (!signingEnabled) return;
      paths.length=0; currentPath=[]; draw(); document.getElementById('signed').innerHTML='';
    });

    document.getElementById('undo').addEventListener('click', ()=>{
      if (!signingEnabled) return;
      if (currentPath && currentPath.length) {
        currentPath = [];
        drawing = false;
        draw();
        return;
      }
      if (paths.length>0) {
        paths.pop();
        draw();
      }
    });

    document.getElementById('confirm').addEventListener('click', async ()=>{
      if (!signingEnabled) return;
      if(paths.length===0){
        if(!confirm('No signature detected. Do you still want to confirm?')) return;
      }
      // Mark signed (prevent further signing)
      signed = true;
      signingEnabled = false;

      // Exit fullscreen if currently fullscreen
      if (document.fullscreenElement === canvasWrap || document.webkitFullscreenElement === canvasWrap) {
        try {
          if (document.exitFullscreen) await document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        } catch(e){ /* ignore */ }
      }

      // Replace the whole signing area with Thank you.
      canvasWrap.innerHTML = '<div style="padding:18px;text-align:center;"><strong>Thank you.</strong></div>';
    });

    // If user exits fullscreen without confirming, disable signing (one-time requirement)
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement && !signed) {
        // user left fullscreen before confirming — disable further signing and hide controls
        signingEnabled = false;
        controlsRow.style.display = 'none';
        startFull.style.display = 'none';
        // show a message asking them to restart the process (or automatically show thank you if desired)
        const info = document.createElement('div');
        info.className = 'small';
        info.style.marginTop = '12px';
        info.textContent = 'Signing cancelled. Please reload the page to try again.';
        if (!document.getElementById('cancelInfo')) {
          info.id = 'cancelInfo';
          canvasWrap.appendChild(info);
        }
      }
    });

    // Initialize blank canvas
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  </script>
</body>
</html>
